name: Deploy Cloudflare Worker + Upload KV Data

on:
  push:
    branches: [main]
    paths:
      - 'cloudflare-worker/**'
      - 'data.json'

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cloudflare-worker

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: cloudflare-worker

      - name: Upload listings data to KV
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: cloudflare-worker
          command: kv:key put --binding=LISTINGS_KV "listings" --path=../data.json
